<div class="recipe-listings">
    {% for recipe in page_obj.object_list %}
        <div class="recipe-item">
            <div class="recipe-image">
                {% if recipe.image and recipe.image.name %}
                    <img src="{{ recipe.image.url }}" alt="{{ recipe.title }}">
                {% else %}
                    <div class="no-image">No image</div>
                {% endif %}
            </div>
            <div class="recipe-details">
                <h3><a href="{% url 'recipe' recipe.id %}">{{ recipe.title }}</a></h3>
                <a class="profile-link" href="{% url 'profile' recipe.user.id %}"><P>{{ recipe.user }}</P></a>
                <p><small>{{ recipe.date_time }}</small></p>
            </div>
        </div>
    {% empty %}
        <p>No recipes found</p>
    {% endfor %}
</div>
